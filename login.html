<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bora Correr</title>
    <link rel="stylesheet" href="style.css"> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-card">
        <img src="BoraCorrer.png" alt="Logo Bora Correr" class="logo">

        <p class="text-link">Novo por aqui? <a href="registro.html">Clique Aqui!</a></p>

        <form action="registro.html">
            <div class="input-group">
                <label for="login">E-mail ou CPF</label>
                <input type="text" id="login" name="login" placeholder="Seu e-mail@dominio.com ou CPF">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="****************">
            </div>

            <button type="submit" class="btn-entrar">ENTRAR</button>
        </form>
        
        <p class="text-link footer-link">Esqueci a Senha! <a href="">Clique Aqui!</a></p>
    </div>
</body>
</html>
