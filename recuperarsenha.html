<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>

    <link rel="stylesheet" href="recuperarsenha.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="recuperar-container">

        <img
            src="https://i.postimg.cc/7bbxDjHj/BORA-CORRER-PNG.png"
            alt="Logo Bora Correr"
            class="logo"
        >

        <div class="card-recuperacao">

            <h1>Recuperar senha</h1>

            <p class="subtitulo">
                Insira abaixo E-mail e CPF cadastrado<br>
                para recuperar a senha.
            </p>

            <form>

                <div class="campo">
                    <label>E-mail</label>

                    <input
                        type="email"
                        placeholder="Digite seu E-mail"
                    >
                </div>

                <div class="campo">
                    <label>CPF</label>

                    <input
                        type="text"
                        placeholder="Digite seu CPF"
                    >
                </div>

                <button type="submit" class="btn-enviar">
                    Enviar
                </button>

            </form>

           <!-- <div class="alerta-sucesso">

                <i class="fa-solid fa-check"></i>

                <span>
                    Sucesso, Verifique seu E-mail!
                </span>

            </div>

            <a href="login.html" class="voltar-login">
                Voltar para o Login
            </a>

        </div>

    </div>

</body>
</html>
