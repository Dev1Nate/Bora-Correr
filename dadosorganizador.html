<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados do Organizador</title>
    <link rel="stylesheet" href="dadosorganizador.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="organizador-container">
        <div class="topo-formulario">
            <img
                src="https://i.postimg.cc/7bbxDjHj/BORA-CORRER-PNG.png"
                alt="Logo Bora Correr"
                class="logo"
            >
            <nav class="menu-nav">

                <a href="#">HOME</a>
                <a href="#">PARCEIROS</a>
                <a href="#">CONTATOS</a>
                <a href="#">EVENTOS</a>
                <a href="#">ORGANIZADOR</a>

            </nav>

            <button class="btn-login">
                <i class="fa-regular fa-user"></i>
                Login
            </button>

        </div>

        <div class="formulario-card">

            <div class="titulo-formulario">
                <i class="fa-solid fa-person-running"></i>
                <h1>Dados do Organizador</h1>
            </div>

            <form>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Digite seu nome completo">
                    </div>

                    <div class="campo">
                        <label>CPF / CNPJ</label>
                        <input type="text" placeholder="CPF / CNPJ">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>E-mail</label>
                        <input type="email" placeholder="@email.com">
                    </div>

                    <div class="campo">
                        <label>Telefone</label>
                        <input type="text" placeholder="(83) 99999-9999">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Cargo / Função</label>
                        <input type="text" placeholder="Cargo ou Função">
                    </div>

                    <div class="campo">
                        <label>Nome da Empresa ou Grupo Esportivo</label>
                        <input type="text" placeholder="Nome da Empresa ou Grupo Esportivo">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Instagram ou Site</label>
                        <input type="text" placeholder="Ex: @Boracorrerpb">
                    </div>

                    <div class="campo">
                        <label>Upload do Logo</label>
                        <input type="file">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Cidade</label>
                        <input type="text" placeholder="Cidade">
                    </div>

                    <div class="campo">
                        <label>Estado</label>
                        <input type="text" placeholder="UF">
                    </div>

                </div>

                <div class="campo campo-full">
                    <label>Endereço Completo (Logradouro, Nº, Complemento, Bairro)</label>

                    <input type="text" placeholder="Cidade">
                </div>

                <div class="botao-container">
                    <button type="submit" class="btn-cadastrar">
                        Cadastrar
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>
</html>
