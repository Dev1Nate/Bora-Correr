    <style>
        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 16px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
        }

        .carousel-slide {
            min-width: 100%;
        }

        .carousel-slide img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.85);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 22px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }

        .carousel-btn:hover {
            background: white;
        }

        .btn-prev {
            left: 12px;
        }

        .btn-next {
            right: 12px;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dot.active {
            background: #ff5500;
        }
    </style>
</head>

    <script>
        const track = document.getElementById('carouselTrack');
        const dots = document.querySelectorAll('.dot');
        const total = 3;
        let current = 0;

        function goTo(index) {
            current = (index + total) % total;
            track.style.transform = `translateX(-${current * 100}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === current));
        }

        document.getElementById('btnPrev').addEventListener('click', () => goTo(current - 1));
        document.getElementById('btnNext').addEventListener('click', () => goTo(current + 1));
        dots.forEach(dot => dot.addEventListener('click', () => goTo(+dot.dataset.index)));
    </script>
