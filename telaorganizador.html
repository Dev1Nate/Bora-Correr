<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bora Correr – Organizador</title>
  
  <link rel="stylesheet" href="telaorganizador.css">
</head>
<body>

  <header class="main-global-header">
    <div class="header-inner">
      <div class="logo-space">
        <img src="BoraCorrer.png" class="brand-logo" alt="Bora Correr">
      </div>
      
      <nav class="navigation-menu">
        <ul class="nav-items-list">
          <li><a href="#">HOME</a></li>
          <li><a href="#">PARCEIROS</a></li>
          <li><a href="#">CONTATOS</a></li>
          <li><a href="#">EVENTOS</a></li>
          <li><a href="#" class="active">ORGANIZADOR</a></li>
        </ul>
        <button class="orange-login-btn">👤 Login</button>
      </nav>
    </div>
  </header>

  <div class="content-wrapper">
    
    <main class="left-orange-card">
      
      <div class="card-text-side">
        <h1 class="main-hero-text">
          Organizar<br>
          eventos nunca<br>
          foi tão rápido,<br>
          fácil e<br>
          profissional.
        </h1>
        
        <div class="hero-action-buttons">
          <button class="action-btn-white">Cadastra-se Como Organizador</button>
          <button class="action-btn-dark">Já Tenho Cadastro de Organizador</button>
        </div>
      </div>

      <div class="card-image-side">
        <img src="organizadorpng.png" class="mockup-notebook-img" alt="Painel do Organizador no Notebook">
      </div>

    </main>

  </div>

</body>
</html>
