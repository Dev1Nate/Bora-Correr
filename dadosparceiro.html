<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Parceiro</title>
    <link rel="stylesheet" href="dadosparceiro.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="parceiro-container">
        <header class="topo-formulario">
            <img
                src="https://i.postimg.cc/7bbxDjHj/BORA-CORRER-PNG.png"
                alt="Logo Bora Correr"
                class="logo"
            >

            <nav class="menu-nav">

                <a href="telainicial.html">HOME</a>
                <a href="#">PARCEIROS</a>
                <a href="#">CONTATOS</a>
                <a href="#">EVENTOS</a>
                <a href="#">ORGANIZADOR</a>

            </nav>

           <a href="login.html">
            <button class="btn-login">
                <i class="fa-regular fa-user"></i>
                Login
            </button>
            </a>

        </header>

        <div class="formulario-card">

            <div class="titulo-formulario">
                <i class="fa-solid fa-person-running"></i>

                <h1>Cadastrar Parceiro</h1>
            </div>

            <form>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Nome Completo">
                    </div>

                    <div class="campo">
                        <label>CPF / CNPJ</label>
                        <input type="text" placeholder="CPF / CNPJ">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Nome da Empresa</label>
                        <input type="text" placeholder="Nome da Empresa">
                    </div>

                    <div class="campo">
                        <label>Telefones para Suporte</label>

                        <div class="duplo-input">
                            <input type="text" placeholder="(83) 99999-9999">
                            <input type="text" placeholder="(83) 99999-9999">
                        </div>
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>WebSite ou Portfolio</label>
                        <input type="text" placeholder="Ex: Boracorrer.com.br">
                    </div>

                    <div class="campo">
                        <label>Observações</label>
                        <input type="text" placeholder="Serviços oferecidos, Equipamentos Utilizados">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Instagram ou Site</label>
                        <input type="text" placeholder="Ex: @Boracorrerpb">
                    </div>

                    <div class="campo">
                        <label>Logo Marca do Parceiro</label>
                        <input type="file">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Cidade</label>
                        <input type="text" placeholder="Cidade">
                    </div>

                    <div class="campo">
                        <label>Estado</label>
                        <input type="text" placeholder="UF">
                    </div>

                </div>

                <div class="linha-formulario">

                    <div class="campo">
                        <label>Cupom de Desconto</label>
                        <input type="text" placeholder="Cupom">
                    </div>

                    <div class="campo">
                        <label>Quantidade de Membros da Equipe</label>
                        <input type="text" placeholder="Membros">
                    </div>

                </div>

                <div class="botao-container">
                    <button type="submit" class="btn-cadastrar">
                        Cadastrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
