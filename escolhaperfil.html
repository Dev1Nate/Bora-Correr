href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>

        </p>
        <div class="perfil-cards">

    <div class="perfil-card active">

        </p>
         </div>
         </a>
                <a href="dadosorganizador.html" class="perfil-link">

        <p>
            Crie, gerencie e<br>
            publique seus eventos.
        </p>

    </div>

</a>

           <a href="dadosparceiro.html" class="perfil-link">

    <div class="perfil-card">
        <i class="fa-solid fa-handshake"></i>

        <h2>Parceiros</h2>

        <p>
            Marcas, lojas<br>
            e fotógrafos.
        </p>
    </div>

</a>
                </p>
            </div>
        </div>
    </div>
